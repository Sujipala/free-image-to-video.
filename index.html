<!DOCTYPE html>
<html>
<head>
    <title>Image To Video Generator</title>
</head>
<body>

<h1>Image To Video Generator</h1>

<h3>Description</h3>
<textarea
    id="description"
    rows="5"
    cols="50"
    placeholder="Describe how you want the video to look">
</textarea>

<br><br>

<h3>Upload Images</h3>
<input type="file" id="images" multiple accept="image/*">

<br><br>

<h3>Video Length</h3>
<select id="duration">
    <option value="3">3 Seconds</option>
    <option value="5">5 Seconds</option>
    <option value="10">10 Seconds</option>
</select>

<br><br>

<button id="generateBtn">
Generate Video
</button>

<br><br>

<video id="video" controls width="500"></video>

</body>
</html>
